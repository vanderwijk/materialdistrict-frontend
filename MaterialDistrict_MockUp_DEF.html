/* ── CARD BUTTON & BADGE FIXES ── */
/* Round card action buttons — always circular, white, above image content */
.mat-card-btn {
  width:28px;height:28px;border-radius:50%!important;
  background:var(--surface)!important;
  display:flex;align-items:center;justify-content:center;
  border:none;color:var(--text-muted);flex-shrink:0;
  box-shadow:0 1px 4px rgba(0,0,0,0.18);
  transition:background 0.12s,transform 0.12s;
  cursor:pointer;position:relative;z-index:2;
  -webkit-appearance:none;
}
.mat-card-btn:hover{background:rgba(255,255,255,1)!important;transform:scale(1.08)}
/* The button container — transparent */
.mat-card-btn + .mat-card-btn { margin:0; }
/* Hide any stray checkbox/input inside card image */
.mat-card-img input,.mat-card-img label,
[style*="border-radius:var(--radius-md) var(--radius-md) 0 0"] input,
[style*="border-radius:var(--radius-md) var(--radius-md) 0 0"] label { display:none!important; }
/* icon-btn always round */
.icon-btn { border-radius:50%!important; }
/* Filter sidebar — contain its own paint, prevent checkbox bleed */
.ov-filter-sidebar { z-index:1; contain:layout paint; }
.ov-wrap > :last-child { position:relative; z-index:2; }
/* Mat-card isolation */
.mat-card { isolation:isolate; }

/* ============================================================ */
/* VARIANT 2 — modern sans, more whitespace, no orange accent.    */
/* Display = Space Grotesk (geometrische sans, eigentijds).       */
/* Body    = Inter.                                              */
/* Geen structuur of klassen aangeraakt.                          */
/* ============================================================ */

:root {
  --font-display: 'Space Grotesk', system-ui, sans-serif;
  --font-body:    'Inter', system-ui, -apple-system, sans-serif;

  /* warm wit, paper-feel */
  --bg:        #FBFAF7;
  --surface:   #FFFFFF;
  --surface2:  #F4F2ED;
  --border:    #E8E4DD;
  --text:      #1A1A1A;
  --text-muted:#5C5C5C;
  --text-hint: #999999;

  /* subtielere ronding */
  --radius:    3px;
  --radius-md: 4px;
  --radius-lg: 8px;

  /* shadows vrijwel weg */
  --shadow:    none;
  --shadow-lg: 0 2px 14px rgba(0,0,0,0.06);
}

/* --- Body baseline --- */
html, body {
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.65;
  font-feature-settings: "ss01", "cv11";
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* --- Alle koppen: Space Grotesk, strakke tracking --- */
.hero-title,
.section-title,
.ed-featured-title,
.login-title,
.login-form-title,
.page-title,
.sidebar-cta-title,
.cm-section-heading,
.cm-pull-quote,
.ip-title,
.stat-value,
.plan-name,
.logo-text {
  font-family: var(--font-display);
  font-weight: 500;
  letter-spacing: -0.02em;
  line-height: 1.15;
}

/* --- Section titles: groot, navy, modern --- */
.section-title {
  font-size: 44px;
  color: var(--text);
  font-weight: 600;
  letter-spacing: -0.03em;
  line-height: 1.05;
}
.section-hd { margin-bottom: 36px; }

/* --- Hero --- */
.hero-title {
  font-size: 64px;
  font-weight: 600;
  letter-spacing: -0.03em;
  line-height: 1.02;
}
.hero-eyebrow {
  letter-spacing: 0.16em;
  font-weight: 500;
}

/* --- Editorial featured (homepage hero kaart) --- */
.ed-featured-title {
  font-size: 52px;
  font-weight: 600;
  letter-spacing: -0.03em;
  line-height: 1.05;
}

/* --- Card titels --- */
.card-title {
  font-size: 17px;
  font-weight: 600;
  line-height: 1.4;
  letter-spacing: -0.015em;
}
.story-title {
  font-size: 15px;
  font-weight: 500;
  line-height: 1.4;
  letter-spacing: -0.01em;
}

/* --- Eyebrows / micro-labels --- */
.tag,
.shortcuts-label,
.story-label,
.card-date,
.ed-side-title,
.sb-section-hd,
.stat-label,
.field-label,
.ed-featured-eyebrow,
.login-eyebrow,
.login-form-label,
.ip-section-title {
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

/* --- Header navigation: niet uppercase, modern --- */
.header-nav button {
  font-size: 14px;
  font-weight: 500;
  text-transform: none;
  letter-spacing: -0.005em;
  color: var(--text);
}
.header-nav button:hover { color: var(--navy); }
.header-nav button.active { color: var(--navy); }

/* --- Logo --- */
.logo-text {
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.025em;
  line-height: 1.05;
}

/* --- Cards: shadows weg, hairline-border, geen lift on hover --- */
.card,
.sw-card,
.quote-card,
.partner-card,
.dash-panel,
.tr-card,
.cm-card,
.sb-section,
.stat-card,
.mat-card {
  box-shadow: none;
  border: 1px solid var(--border);
}
.card:hover,
.tr-card:hover,
.cm-card:hover,
.partner-card:hover,
.mat-card:hover {
  box-shadow: var(--shadow-lg);
  transform: none;
}
.story-item:hover { transform: none; }

/* --- Witruimte: secties veel ruimer --- */
.hp-main {
  padding: 96px 32px 120px;
  gap: 56px;
}
.hp-content { gap: 96px; }

.hero-inner { min-height: 460px; }
.hero-left  { padding: 80px 56px 80px 32px; }
.hero-right { padding: 80px 32px 80px 56px; }

.shortcuts-hd     { padding: 28px 32px 4px; }
.shortcuts-inner  { padding: 8px 32px 16px; }
.shortcut         { padding: 12px 20px; }

.footer-inner   { padding: 72px 32px; gap: 56px; }
.footer-bottom  { padding: 20px 32px; }

.login-outer    { padding: 80px 32px 120px; }
.login-left,
.login-right    { padding: 72px 56px; }
.login-title    { font-size: 56px; font-weight: 600; }
.login-form-title { font-size: 42px; font-weight: 600; }

.page-title { font-size: 48px; margin-bottom: 32px; font-weight: 600; }

/* --- Quotes: rustiger, niet-card-achtig --- */
.quote-card {
  padding: 40px 32px;
  background: transparent;
  border: 1px solid var(--border);
}
.quote-text {
  font-family: var(--font-body);
  font-style: normal;
  font-size: 15px;
  line-height: 1.6;
  font-weight: 400;
  color: var(--text);
}
.quote-mark {
  font-family: var(--font-display);
  color: var(--navy);
  opacity: 0.4;
}
.quote-divider { background: var(--navy); }

/* --- Buttons: ruimer, modern --- */
.btn {
  height: 42px;
  padding: 0 22px;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: -0.005em;
  border-radius: var(--radius);
}
.btn-lg { height: 52px; padding: 0 32px; font-size: 16px; }
.btn-sm { height: 34px; padding: 0 14px; font-size: 13px; }

/* --- Sidebar CTA --- */
.sidebar-cta { padding: 32px 28px; }
.sidebar-cta-title { font-size: 28px; font-weight: 600; line-height: 1.15; }

/* --- Editorial hero ademen --- */
.ed-hero { padding: 56px 32px 56px; }
.ed-hero-greeting { margin-bottom: 32px; letter-spacing: 0.14em; font-weight: 500; }
.ed-featured { padding: 0 48px 48px 0; }
.ed-side     { padding: 0 0 48px 40px; }
.ed-featured-thumb { margin-bottom: 32px; }
.ed-featured-desc { font-size: 16px; line-height: 1.65; }

/* --- Stat cards --- */
.stat-card { background: transparent; border: 1px solid var(--border); padding: 24px; }
.stat-value { font-size: 44px; font-weight: 600; letter-spacing: -0.03em; }

/* --- Forms ruimer --- */
.field-wrap input,
.field-wrap textarea,
.field-wrap select { height: 48px; padding: 0 16px; }

/* --- Material category tabs rustiger --- */
.mat-cat-tab {
  font-size: 14px;
  font-weight: 400;
  text-transform: none;
  letter-spacing: 0;
  padding: 12px 20px;
}
.mat-cat-tab.active { font-weight: 600; }

/* --- Section-link: navy, niet uppercase --- */
.section-link {
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0;
  text-transform: none;
  color: var(--navy);
}

/* --- Insider badge: symmetrische padding + correct gecentreerde tekst --- */
.insider-badge {
  font-size: 10px;
  letter-spacing: 0.08em;
  height: 22px;
  padding: 0 10px;
  gap: 6px;
  border-radius: 11px;
  line-height: 22px;
}
/* When the badge has its sparkle icon, the icon needs less right gap */
.insider-badge .ib-icon {
  width: 14px;
  height: 14px;
  margin-left: -3px;
}
/* Smaller variant: voor inline gebruik in card-titels of compacte plekken */
.insider-badge.is-sm {
  font-size: 9px;
  height: 18px;
  padding: 0 8px;
  border-radius: 9px;
  line-height: 18px;
  gap: 4px;
}
.insider-badge.is-sm .ib-icon {
  width: 12px;
  height: 12px;
}

/* --- Inputs erven nieuwe body font --- */
.field-wrap select option,
input, select, textarea {
  font-family: var(--font-body);
}

/* --- Subtielere scrollbar --- */
::-webkit-scrollbar-thumb { background: var(--border); }

/* --- Field label: vaste min-height zodat rijen met & zonder status-badge gelijke hoogte hebben --- */
.field-label {
  min-height: 20px;
}

/* --- Field input: tekst moet verticaal gecentreerd staan in de 44px hoge input --- */
.field-wrap input,
.field-wrap select {
  line-height: 44px;

.field-wrap textarea {
  line-height: 1.55;
}

/* --- Universal filter count badge — matches materials reference --- */
.filter-count {

  font-weight: 500;
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
  min-width: 22px;
  justify-content: center;
}

/* --- V11: Universal channel badges (white pill, on thumbnail) --- */
.channel-pills {
  position: absolute;
  bottom: 8px;
  left: 8px;

  gap: 4px;
  flex-wrap: wrap;

}
.channel-pill {
  font-size: 10px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 100px;

  backdrop-filter: blur(4px);
  white-space: nowrap;
  letter-spacing: 0;
}

/* --- V11: Insider title prefix — icon directly before title text --- */
.insider-title-row {
  display: flex;
  align-items: flex-start;
  gap: 6px;
}
.insider-title-icon {
  flex-shrink: 0;
  margin-top: 2px;
  display: inline-flex;
}

/* --- V12: Unified filter sidebar (Books reference) --- */
.uf-sidebar {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  overflow: hidden;
}
.uf-header {
  padding: 12px 14px;
  background: var(--navy);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.uf-header-title {
  font-size: 13px;
  font-weight: 700;
  color: white;
}
.uf-header-clear {
  font-size: 11px;
  color: rgba(255,255,255,0.6);
  background: none;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: var(--radius);
  padding: 2px 8px;
  cursor: pointer;
}
.uf-header-clear:hover {
  background: rgba(255,255,255,0.08);
  color: white;
}
.uf-section {
  border-bottom: 1px solid var(--border);
}
.uf-section:last-child { border-bottom: none; }
.uf-section-toggle {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 14px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  background: none;
  border: none;
  cursor: pointer;
  text-align: left;
  font-family: inherit;
}
.uf-section-toggle:hover { background: var(--surface2); }
.uf-section-toggle .uf-chevron {
  transition: transform 0.2s;
  flex-shrink: 0;
  color: var(--text-hint);
}
.uf-section-body {
  padding: 4px 14px 12px;
}
.uf-option {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 5px 0;
  cursor: pointer;
}
.uf-option:hover .uf-option-label { color: var(--text); }
.uf-checkbox {
  width: 16px;
  height: 16px;
  border-radius: 3px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.12s;
}
.uf-checkbox.checked {
  border-color: var(--navy);
  background: var(--navy);
}
.uf-option-label {
  flex: 1;
  font-size: 13px;
  color: var(--text-muted);
  transition: color 0.12s;
}
.uf-option.selected .uf-option-label { color: var(--text); font-weight: 500; }
.uf-search {
  width: 100%;
  height: 32px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  padding: 0 30px 0 10px;
  font-size: 12px;
  box-sizing: border-box;
  margin-bottom: 8px;
}

/* Inline styles in originele HTML hebben vaste pixelmaten — die overschrijven we hier. */

/* Hero feature CTA card title: 26 → 32 */

}
/* Detail page titles 36px / 38px → 48 */
[style*="font-family:var(--font-display)"][style*="font-size:36px"],
[style*="font-family:var(--font-display)"][style*="font-size:38px"] {

/* CM pull quote and section heading */

.cm-section-heading { font-size: 28px; }
.ip-title { font-size: 28px; }

/* ============================================================ */
/* V4 — card consistency, button colors, brand styling           */
/* ============================================================ */

/* --- card-brand (eyebrow boven cardtitel op homepage materials) --- */
.card-brand {

/* --- Mat-card op overzicht: titel groter, brand als eyebrow erbóven  --- */

}

[style*="font-weight:700"][style*="font-size:13px"][style*="color:var(--navy)"],

/* --- Book titels groter, in zwart --- */

[style*="font-size:14px"][style*="font-weight:700"][style*="color:var(--navy)"] {

  font-size: 17px !important;

/* --- Story titels in sidebar nog wat groter --- */

/* --- Add to cart en andere btn-blue: zelfde navy als primary --- */

}

<body>
<div id="app">
  <header class="site-header">

<script>const $ = s => document.querySelector(s);
const $$ = s => [...document.querySelectorAll(s)];
const IB_ICON_HTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><defs><mask id="icm"><rect width="24" height="24" fill="white"/><path d="M12 5.25C12.85 9.05 14.95 11.15 18.75 12C14.95 12.85 12.85 14.95 12 18.75C11.15 14.95 9.05 12.85 5.25 12C9.05 11.15 11.15 9.05 12 5.25Z" fill="black"/></mask></defs><circle cx="12" cy="12" r="10" fill="white" mask="url(#icm)"/></svg>';

// ── MATERIAL TYPES — official list with 3-letter codes ──
const MATERIAL_TYPES = [
  {name:"(Bio)plastics",code:"PLA"},
  {name:"Ceramics",code:"CER"},
  {name:"Coatings",code:"COA",count:203},
  {name:"Composites",code:"COM",count:280},
  {name:"Concretes",code:"CON",count:220},
  {name:"Glass",code:"GLA",count:241},
  {name:"Metals",code:"MET",count:89},
  {name:"Natural stones",code:"NST",count:907},
  {name:"Other naturals",code:"ONA",count:335},
  {name:"Wood",code:"WOO",count:932}
];

// ── CHANNELS — editorial themes that cut across all content types ──
const CHANNELS = [
  'Acoustic','Biobased','Biodegradable','Concept','Curious','Ecology',
  'Healing Environment','High-tech','Innovation','Leisure & Hospitality',
  'Lightweight','Manufacture','Process','Recycling','Sense & Sensibility',
  'Smart Materials','Sustainable','Technology Transfer','Translucency','Trend'
];
function matCode(cat) {
  return (MATERIAL_TYPES.find(t=>t.name===cat)||{code:'---'}).code;
}
let view = 'homepage';
let loginIntent = 'discover';
let isLoggedIn = false;
// ── DARK MODE ──
(function(){const s=localStorage.getItem('md-theme');if(s==='dark')document.documentElement.setAttribute('data-theme','dark');})();


function toggleMobileFilter() {
  const sidebar = document.querySelector('.ov-filter-sidebar');
  const backdrop = document.getElementById('mobFilterBackdrop') || (() => {
    const b = document.createElement('div');
    b.id = 'mobFilterBackdrop';
    b.className = 'mob-filter-backdrop';
    b.onclick = closeMobileFilter;
    document.body.appendChild(b);
    return b;
  })();
  const isOpen = sidebar && sidebar.classList.contains('mob-open');
  if (isOpen) { closeMobileFilter(); } else {
    if (sidebar) sidebar.classList.add('mob-open');
    backdrop.classList.add('open');
  }
}
function closeMobileFilter() {
  const sidebar = document.querySelector('.ov-filter-sidebar');
  const backdrop = document.getElementById('mobFilterBackdrop');
  if (sidebar) sidebar.classList.remove('mob-open');
  if (backdrop) backdrop.classList.remove('open');
}

// ── MOBILE NAV ──
function toggleMobileNav() {
  let nav = document.getElementById('mobileNavDrawer');
  let backdrop = document.getElementById('mobileNavBackdrop');
  if (!nav) {
    // Create drawer
    backdrop = document.createElement('div');
    backdrop.id = 'mobileNavBackdrop';
    backdrop.onclick = closeMobileNav;
    backdrop.style.cssText = 'position:fixed;inset:0;z-index:149;background:rgba(0,0,0,0.5);display:none;';
    document.body.appendChild(backdrop);
    nav = document.createElement('div');
    nav.id = 'mobileNavDrawer';
    nav.style.cssText = 'position:fixed;top:56px;left:0;bottom:0;width:280px;z-index:150;background:var(--surface);border-right:1px solid var(--border);transform:translateX(-100%);transition:transform 0.28s cubic-bezier(.4,0,.2,1);overflow-y:auto;display:flex;flex-direction:column;';
    document.body.appendChild(nav);
  }
  const isOpen = nav.style.transform === 'translateX(0px)' || nav.style.transform === 'translateX(0)';
  if (isOpen) { closeMobileNav(); return; }
  // Populate nav
  const navItems = [
    {key:'materials',label:'Materials',color:'var(--ct-material-dark)'},
    {key:'articles',label:'Articles',color:'var(--ct-article-dark)'},
    {key:'brands',label:'Brands',color:'var(--ct-brand-dark)'},
    {key:'events',label:'Events',color:'var(--ct-event-dark)'},
    {key:'books',label:'Books',color:'var(--ct-book-dark)'},
    {key:'talks',label:'Talks',color:'var(--ct-member-dark)'},
    {key:'channels',label:'Channels',color:'var(--navy)'},
  ];
  nav.innerHTML = `
    <div style="padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
      <span style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-hint);">Menu</span>
      <button onclick="closeMobileNav();" style="color:var(--text-muted);font-size:20px;line-height:1;">×</button>
    </div>
    <div style="padding:8px 0;">
      ${navItems.map(item=>`
        <button onclick="go('${item.key}');closeMobileNav();" style="width:100%;text-align:left;padding:14px 20px;font-size:15px;font-weight:600;color:${item.color};border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
          ${item.label}
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
        </button>`).join('')}
    </div>
    <div style="padding:16px;border-top:1px solid var(--border);margin-top:auto;">
      ${isLoggedIn
        ? `<button onclick="go('dashboard');closeMobileNav();" class="btn btn-primary" style="width:100%;justify-content:center;">Dashboard</button>`
        : `<button onclick="go('login');closeMobileNav();" class="btn btn-primary" style="width:100%;justify-content:center;">Login</button>`}
    </div>`;
  nav.style.transform = 'translateX(0)';
  backdrop.style.display = 'block';
  // Update hamburger icon to X
  document.getElementById('mobileMenuIcon').innerHTML = '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>';
}
function closeMobileNav() {
  const nav = document.getElementById('mobileNavDrawer');
  const backdrop = document.getElementById('mobileNavBackdrop');
  if (nav) nav.style.transform = 'translateX(-100%)';
  if (backdrop) backdrop.style.display = 'none';
  const icon = document.getElementById('mobileMenuIcon');
  if (icon) icon.innerHTML = '<line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>';
}
function updateDarkModeIcon(){
  const isDark=document.documentElement.getAttribute('data-theme')==='dark';
  const icon=document.getElementById('dmIcon');

function applyBgVariant() {
  const root = document.documentElement;
  const isDark = root.getAttribute('data-theme') === 'dark';
  // In dark mode the [data-theme="dark"] CSS block handles all variables.
  // Inline style.setProperty overrides win over attribute selectors, so clear them.
  if (isDark) {
    ['--bg','--surface','--surface2','--border','--shadow'].forEach(p => root.style.removeProperty(p));
    return;
  }
  if (bgVariant === '1') {
    root.style.setProperty('--bg', '#eef1f3');
    root.style.setProperty('--surface', '#ffffff');
    root.style.setProperty('--surface2', '#f7f9fb');
    root.style.setProperty('--border', '#e2e8ef');
    root.style.setProperty('--shadow', '0 1px 3px rgba(13,47,78,0.07),0 1px 2px rgba(13,47,78,0.04)');
  } else if (bgVariant === '2') {
    root.style.setProperty('--bg', '#f0f0ee');
    root.style.setProperty('--surface', '#ffffff');
    root.style.setProperty('--surface2', '#f5f5f3');
    root.style.setProperty('--border', '#e4e4e0');
    root.style.setProperty('--shadow', '0 1px 3px rgba(13,47,78,0.07),0 1px 2px rgba(13,47,78,0.04)');
  } else {
    root.style.setProperty('--bg', '#ffffff');
    root.style.setProperty('--surface', '#ffffff');
    root.style.setProperty('--surface2', '#f7f8fa');
    root.style.setProperty('--border', '#e8eaed');
    root.style.setProperty('--shadow', '0 1px 4px rgba(13,47,78,0.10),0 2px 8px rgba(13,47,78,0.07)');
  }
}

function applyLiveValidation(container) {
if (!container) return;
container.querySelectorAll('.field-wrap').forEach(wrap => {
const el = wrap.querySelector('input, textarea, select');
if (!el) return;
const label = wrap.closest('.form-field')?.querySelector('.field-label');
const isOptional = label ? /optional|twitter|instagram|linkedin|youtube|pinterest|facebook|vat|chamber/i.test(label.textContent) : false;
if (label && !label.querySelector('.field-status')) {
const badge = document.createElement('span');
badge.className = 'field-status';
label.appendChild(badge);
}
const validate = () => {
const val = el.tagName==='SELECT' ? el.value : el.value.trim();
const filled = val !== '' && !val.startsWith('Select');
wrap.classList.toggle('filled', filled);
if (!wrap.classList.contains('error')) { /* don't clear error state until fixed */ }
if (filled) wrap.classList.remove('error');
const badge = label?.querySelector('.field-status');
if (badge) {
if (filled) {
badge.className = 'field-status status-done';
badge.innerHTML = '<svg width="10" height="10" fill="none" stroke="white" stroke-width="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>';
} else {
badge.className = 'field-status';
badge.innerHTML = '';
}
}
};
el.addEventListener('input', validate);
el.addEventListener('change', validate);
validate();
});
}
function validateForm(container) {
let valid = true;
container.querySelectorAll('.field-wrap').forEach(wrap => {
const el = wrap.querySelector('input, textarea, select');
if (!el) return;
if (wrap.hasAttribute('data-optional')) return;
const label = wrap.closest('.form-field')?.querySelector('.field-label');
const isOptional = label ? /optional|twitter|instagram|linkedin|youtube|pinterest|facebook|vat|chamber/i.test(label.textContent) : false;
if (isOptional) return;
const val = el.tagName==='SELECT' ? el.value : el.value.trim();
const filled = val !== '' && val !== 'Select your profession';
if (!filled) {
wrap.classList.add('error');
wrap.classList.remove('filled');
const badge = label?.querySelector('.field-status');
if (badge) { badge.className='field-status status-fail'; badge.innerHTML='✕'; }
valid = false;
}
});
return valid;
}

function toggleFilterValue(group, value) {
if (!matActiveFilters[group]) matActiveFilters[group] = [];

render();
}

function addApplication(prefix) {

  if (!m || !s || !tp) return;

  const existing = [...list.querySelectorAll('[data-combo]')].map(el => el.dataset.combo);
  const combo = m + '|' + s + '|' + tp;

function saveCurrentSearch() {
if (!isMember) { showInsiderModal('savedSearch'); return; }
const hasFilters = Object.keys(matActiveFilters).length > 0 || matFilter !== 'All' || matSearch.trim();
if (!hasFilters) { toast('Add at least one filter or search term before saving', 'error'); return; }
const parts = [];
if (matSearch) parts.push(matSearch);
if (matFilter !== 'All') parts.push(matFilter);
Object.entries(matActiveFilters).slice(0,2).forEach(([k,v]) => { if (v.length) parts.push(v[0]); });
const defaultName = parts.join(' · ') || 'My search';
const name = prompt('Name this search:', defaultName);
if (!name || !name.trim()) return;
const snapshot = {
matSearch: matSearch,
matFilter: matFilter,
matActiveFilters: JSON.parse(JSON.stringify(matActiveFilters)),
};
savedSearches.unshift({
id: Date.now(),
name: name.trim(),
filters: snapshot,
alert: false,
created: 'Today',
newCount: 0,
});
toast('Search "' + name.trim() + '" saved', 'success');
render();
}

function storyTypeMeta(type) {

function storyRelatedLinks(s, compact) {
  const rel = s.related || {};
  const mats = (rel.materials||[]).map(id=>ALL_MATERIALS.find(m=>m.id===id)).filter(Boolean);

  if (!mats.length && !talks.length && !linkedStories.length) return '';

    return `<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);display:flex;align-items:center;gap:6px;flex-wrap:wrap;">

      ${mats.slice(0,1).map(m=>`<span style="font-size:10px;color:var(--ct-material-dark);background:var(--ct-material-pale);padding:2px 7px;border-radius:100px;cursor:pointer;" onclick="event.stopPropagation();activeMaterialId=${m.id};go('material-detail');">${m.name}</span>`).join('')}
      ${talks.slice(0,1).map(t=>`<span style="font-size:10px;color:var(--ct-member-dark);background:var(--ct-member-pale);padding:2px 7px;border-radius:100px;cursor:pointer;" onclick="event.stopPropagation();activeTalkId=${t.id};go('talk-detail');">${t.speaker}</span>`).join('')}
      ${linkedStories.slice(0,1).map(st=>`<span style="font-size:10px;color:var(--text-muted);background:var(--surface2);border:1px solid var(--border);padding:2px 7px;border-radius:100px;cursor:pointer;" onclick="event.stopPropagation();activeStoryId=${st.id};go('story-detail');">${st.title.slice(0,30)}…</span>`).join('')}

  }

  return `<div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border);">

      </div>`).join('')}
      ${talks.map(t=>`<div style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:6px 0;" onclick="activeTalkId=${t.id};go('talk-detail');" onmouseover="this.style.opacity='0.7'" onmouseout="this.style.opacity='1'">

function renderBooksOverview() {

  if (!window._bkCat) window._bkCat = 'All';

  if (!window._bkPub) window._bkPub = 'All';
  if (!window._bkPrice) window._bkPrice = 'All';
  const ch = window._bkCh;
  let items = [...ALL_BOOKS];
  if (ch !== 'All') items = items.filter(b=>(b.channels||[]).includes(ch));
  if (window._bkCat !== 'All') items = items.filter(b=>(b.categories||[]).includes(window._bkCat));
  if (window._bkFmt !== 'All') items = items.filter(b=>b.type===window._bkFmt);
  if (window._bkPub !== 'All') items = items.filter(b=>b.publisher===window._bkPub);
  if (window._bkPrice !== 'All') {
    if (window._bkPrice==='Under €35') items = items.filter(b=>b.price<35);
    if (window._bkPrice==='€35–€50') items = items.filter(b=>b.price>=35&&b.price<=50);
    if (window._bkPrice==='Over €50') items = items.filter(b=>b.price>50);
  }
  const categories = ['All',...new Set(ALL_BOOKS.flatMap(b=>b.categories||[]).sort())];
  const formats = ['All',...new Set(ALL_BOOKS.map(b=>b.type).filter(Boolean).sort())];
  const publishers = ['All',...new Set(ALL_BOOKS.map(b=>b.publisher).filter(Boolean).sort())];
  const prices = ['All','Under €35','€35–€50','Over €50'];

  function countFor(key, value) {

    if (key === '_bkFmt') return ALL_BOOKS.filter(b=>b.type===value).length;
    if (key === '_bkPub') return ALL_BOOKS.filter(b=>b.publisher===value).length;
    if (key === '_bkPrice') {

<button class="uf-section-toggle" onclick="const el=this.nextElementSibling;const open=el.style.display!=='none';el.style.display=open?'none':'block';this.querySelector('svg').style.transform=open?'rotate(-90deg)':'rotate(0)';">

<div class="uf-section-body" style="display:none;">
${options.map(o=>{
const checked = val===o;
return `<label class="uf-option ${checked?'selected':''}" onclick="window.${key}='${o.replace(/'/g,"\\'")}';render();event.preventDefault();">
<span class="uf-checkbox ${checked?'checked':''}">${checked?'<svg width="10" height="10" fill="none" stroke="white" stroke-width="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>':''}</span>
<span class="uf-option-label">${o}</span>

}).join('')}
</div>

<!-- Grid -->

function renderStoryDetail() {
  const s = ALL_STORIES.find(st=>st.id===activeStoryId) || ALL_STORIES[0];

  const isPerson = s.type === 'people';
  const isCollab = s.type === 'collaborations';
  const isProject = s.type === 'projects';

  // Synthesize a photos array if the story doesn't have one (DB-fallback)
  const photos = s.photos || (() => {
    const base = s.g;
    return [
      { g: base, label: 'Cover', portrait: false },
      { g: base.replace('135deg','45deg'), label: 'Detail', portrait: false },
      { g: base.replace('135deg','90deg'), label: 'Context', portrait: true },

  })();
  const idx = Math.min(activeGalleryIndex, photos.length - 1);
  const p = photos[idx];

  // Body text (one continuous field)
  const bodyText = s.bio || s.summary || '';

  // Type label colour mapping
  const typeColors = {
    news: { bg: 'var(--ct-article-pale)', fg: 'var(--ct-article-dark)' },
    people: { bg: 'var(--ct-member-pale)', fg: 'var(--ct-member-dark)' },
    collaborations: { bg: '#fdeae0', fg: '#a04a10' },
    projects: { bg: '#e8e4f0', fg: '#4a3080' },
  };
  const tc = typeColors[s.type] || typeColors.news;

  // Lightbox (zelfde patroon als materials)
  const lightbox = lightboxOpen ? `
    <div style="position:fixed;inset:0;z-index:300;background:rgba(8,18,28,0.96);display:flex;flex-direction:column;align-items:center;justify-content:center;" onclick="lightboxOpen=false;render();">

          ${photos.map((ph,i)=>`<button onclick="activeGalleryIndex=${i};render();" style="flex-shrink:0;width:72px;height:48px;border-radius:5px;border:2px solid ${i===idx?'white':'rgba(255,255,255,0.15)'};background:${ph.g};opacity:${i===idx?'1':'0.5'};cursor:pointer;"></button>`).join('')}

  return `<div class="fade-in" style="background:var(--bg);min-height:100vh;">
${lightbox}

  const meta = `${s.date} · Story by MaterialDistrict${s.readTime?` · ${s.readTime} read`:''}`;
  const actions = detailActions({ type:'story', shareTitle:s.title });
  return detailHeader(m.label.toLowerCase(), 'stories', tags, s.title, meta, actions);
})()}

function submitRequest(materialId, materialName, brand) {

if (honeypot && honeypot.value.length > 0) { requestWidgetOpen=false; render(); return; }
const options = [...document.querySelectorAll('[data-reqopt]:checked')].map(cb => cb.dataset.reqopt);
const message = document.getElementById('requestMessage')?.value || '';
if (options.length === 0) { toast('Please select at least one option', 'error'); return; }
const req = {
id: Date.now(),
materialId, materialName, brand,
date: new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}),
options, message, status:'Sent'
};
myRequests.unshift(req);
requestWidgetOpen = false;
requestWidgetMaterialId = null;
toast('Request sent to ' + brand, 'success');
render();
}
function submitBrandRequest(brandId, brandName) {

render();
}

Object.entries(f).forEach(([k, v]) => {
if (['matSearch','matFilter','matActiveFilters'].includes(k)) return;
if (Array.isArray(v)) { if (v.length) tags.push({label: k, value: v.join(', ')}); }
else if (typeof v === 'string') tags.push({label: k, value: v});
});
if (f.matActiveFilters) {
Object.entries(f.matActiveFilters).forEach(([k, v]) => {

});
}
return tags;
}

const iconEl = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><defs><mask id="icm${id}"><rect width="24" height="24" fill="white"/><path d="M12 5.25C12.85 9.05 14.95 11.15 18.75 12C14.95 12.85 12.85 14.95 12 18.75C11.15 14.95 9.05 12.85 5.25 12C9.05 11.15 11.15 9.05 12 5.25Z" fill="black"/></mask></defs><circle cx="12" cy="12" r="10" fill="#007890" mask="url(#icm${id})"/></svg>`;
if (clickable) {
  return `<button onclick="${onclick}" style="${wrapStyle}border:none;background:none;padding:0;cursor:pointer;" onmouseover="this.querySelector('.ibtt').style.opacity='1'" onmouseout="this.querySelector('.ibtt').style.opacity='0'">${iconEl}<span class="ibtt" style="${tooltipStyle}">Insiders only<span style="${arrowStyle}"></span></span></button>`;
}
return `<span style="${wrapStyle}" onmouseover="this.querySelector('.ibtt').style.opacity='1'" onmouseout="this.querySelector('.ibtt').style.opacity='0'">${iconEl}<span class="ibtt" style="${tooltipStyle}">Insiders only<span style="${arrowStyle}"></span></span></span>`;
}

/* V11: Compact insider icon to use as title prefix.
   Smaller (14px) and inline so it sits naturally before the title text. */
function insiderTitlePrefix(size=14) {
  const id = 'itp_' + Math.random().toString(36).slice(2,7);
  return `<span class="insider-title-icon" title="Insiders only"><svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><defs><mask id="m${id}"><rect width="24" height="24" fill="white"/><path d="M12 5.25C12.85 9.05 14.95 11.15 18.75 12C14.95 12.85 12.85 14.95 12 18.75C11.15 14.95 9.05 12.85 5.25 12C9.05 11.15 11.15 9.05 12 5.25Z" fill="black"/></mask></defs><circle cx="12" cy="12" r="10" fill="#007890" mask="url(#m${id})"/></svg></span>`;
}
function ibFreeEntry(clickable=false, onclick='') {
const id = 'ib_' + Math.random().toString(36).slice(2,7);
const iconEl = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;"><defs><mask id="icm${id}"><rect width="24" height="24" fill="white"/><path d="M12 5.25C12.85 9.05 14.95 11.15 18.75 12C14.95 12.85 12.85 14.95 12 18.75C11.15 14.95 9.05 12.85 5.25 12C9.05 11.15 11.15 9.05 12 5.25Z" fill="black"/></mask></defs><circle cx="12" cy="12" r="10" fill="#007890" mask="url(#icm${id})"/></svg>`;
const inner = `${iconEl}<span style="font-size:12px;font-weight:600;color:var(--ct-member-dark);">Free entry</span>`;
if (clickable) return `<button onclick="${onclick}" style="display:inline-flex;align-items:center;gap:5px;background:none;border:none;padding:0;cursor:pointer;">${inner}</button>`;
return `<span style="display:inline-flex;align-items:center;gap:5px;">${inner}</span>`;
}
function ibPrice(price, clickable=false, onclick='') {
const id = 'ib_' + Math.random().toString(36).slice(2,7);
const discounted = (price*0.9).toFixed(2);
const iconEl = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;"><defs><mask id="icm${id}"><rect width="24" height="24" fill="white"/><path d="M12 5.25C12.85 9.05 14.95 11.15 18.75 12C14.95 12.85 12.85 14.95 12 18.75C11.15 14.95 9.05 12.85 5.25 12C9.05 11.15 11.15 9.05 12 5.25Z" fill="black"/></mask></defs><circle cx="12" cy="12" r="10" fill="#007890" mask="url(#icm${id})"/></svg>`;
const inner = `${iconEl}<span style="font-size:12px;font-weight:600;color:var(--ct-member-dark);">€${discounted} <span style="font-weight:400;opacity:0.7;">10% off</span></span>`;
if (clickable) return `<button onclick="${onclick}" style="display:inline-flex;align-items:center;gap:5px;background:none;border:none;padding:0;cursor:pointer;">${inner}</button>`;
return `<span style="display:inline-flex;align-items:center;gap:5px;">${inner}</span>`;
}
window.go = go; window.goPage = goPage; window.render = render;
window.toggleUserScope = toggleUserScope;
window.toast = toast; window.showInsiderModal = showInsiderModal;
window.toggleCompare = toggleCompare; window.updateCompareBar = updateCompareBar;
render();</script>

<script>function updateDevToolbar() {
  ['1','2','3'].forEach(v => {
    const btn = document.getElementById('bg-btn-'+v);
    if (!btn) return;
    const active = bgVariant === v;
    btn.style.background = active ? 'var(--navy)' : 'none';
    btn.style.color = active ? 'white' : 'var(--text-muted)';
    btn.style.borderColor = active ? 'var(--navy)' : 'var(--border)';
  });
const active = 'background:var(--navy);color:white;border-color:var(--navy);';
const inactive = 'background:var(--surface);color:var(--text);border-color:var(--border);';
const legacyActive = 'background:#b38a00;color:white;border-color:#b38a00;';
const legacyInactive = 'background:#fffbe8;color:var(--text);border-color:#e6c440;';
const lo = document.getElementById('dt-logout');
const fr = document.getElementById('dt-free');
const ins = document.getElementById('dt-insider');
if (lo) lo.style.cssText += !isLoggedIn ? active : inactive;
if (fr) fr.style.cssText += isLoggedIn && !isMember ? active : inactive;
if (ins) ins.style.cssText += isLoggedIn && isMember ? active : inactive;
const mfFree = document.getElementById('dt-mf-free');
const mfBasis = document.getElementById('dt-mf-basis');
const mfPlus = document.getElementById('dt-mf-plus');
const mfPartner = document.getElementById('dt-mf-partner');
const mfLegacy = document.getElementById('dt-mf-legacy');
if (mfFree) mfFree.style.cssText += (mfTier==='free'&&!mfLegacyMode) ? active : inactive;
if (mfBasis) mfBasis.style.cssText += mfTier==='basis' ? active : inactive;
if (mfPlus) mfPlus.style.cssText += mfTier==='plus' ? active : inactive;
if (mfPartner) mfPartner.style.cssText += mfTier==='partner' ? active : inactive;
if (mfLegacy) mfLegacy.style.cssText += mfLegacyMode ? legacyActive : legacyInactive;
}
document.addEventListener('DOMContentLoaded', updateDevToolbar);</script>

<script>function openSaveToProject(matId, matName) {
if (!isLoggedIn) { toast('Sign in to save materials','error'); window.go('login'); return; }
if (!isMember) { showInsiderModal('compare'); return; }  const modal = document.getElementById('saveToBoardModal');
modal.dataset.matId = matId;
document.getElementById('saveToBoardMatName').textContent = matName;
const list = document.getElementById('saveToBoardList');
list.innerHTML = boards.map(p => {
const inProject = (p.materialIds||[]).includes(matId);
return `<button onclick="
const proj=boards.find(x=>x.id===${p.id});
if(!proj.materialIds.includes(${matId})){proj.materialIds.push(${matId});toast('Added to ${p.name}','success');}
else{toast('Already in ${p.name}');}
document.getElementById('saveToBoardModal').style.display='none';
" style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-md);font-size:13px;font-family:var(--font-body);cursor:pointer;text-align:left;background:${inProject?'var(--green-pale)':'var(--surface)'};">
<span style="font-weight:600;color:var(--navy);">${p.name}</span>
<span style="font-size:11px;color:var(--text-hint);">${inProject?'✓ Added':p.materialIds.length+' mats'}</span>
</button>`;
}).join('');
modal.style.display = 'flex';
}

</script>
